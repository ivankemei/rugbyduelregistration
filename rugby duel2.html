<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rugby Duel Ticket Registration</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
overflow:hidden;
}

/* floating background animation */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background: radial-gradient(circle,#ffffff22 1px, transparent 1px);
background-size:40px 40px;
animation: moveBg 40s linear infinite;
}

@keyframes moveBg{
0%{transform:translate(0,0)}
100%{transform:translate(-200px,-200px)}
}

.container{
background:white;
padding:35px;
border-radius:14px;
box-shadow:0 10px 35px rgba(0,0,0,0.3);
max-width:420px;
width:90%;
text-align:center;
animation:fadeIn 1s ease;
position:relative;
z-index:1;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h2{
margin-bottom:20px;
color:#1a237e;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
transition:0.3s;
font-size:15px;
}

input:focus,select:focus{
border-color:#3949ab;
outline:none;
box-shadow:0 0 5px rgba(57,73,171,0.4);
}

button{
width:100%;
padding:13px;
border:none;
border-radius:6px;
background:linear-gradient(45deg,#1a237e,#3949ab);
color:white;
font-weight:bold;
font-size:15px;
cursor:pointer;
transition:0.3s;
position:relative;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(0,0,0,0.25);
}

button:active{
transform:scale(0.98);
}

.message{
margin-top:15px;
font-weight:bold;
color:#1a237e;
min-height:20px;
}

/* loading animation */

.loading{
pointer-events:none;
opacity:0.8;
}

.loading::after{
content:"";
width:18px;
height:18px;
border:3px solid #fff;
border-top:3px solid transparent;
border-radius:50%;
display:inline-block;
margin-left:10px;
animation:spin 1s linear infinite;
vertical-align:middle;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

</style>

</head>

<body>

<div class="container">

<h2>🏉 Rugby Duel Ticket</h2>

<form id="ticketForm">

<input type="text" name="fullname" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email Address" required>

<input type="tel" name="phone" placeholder="Phone Number (07xxxxxxxx)" required>

<select name="ticket" required>
<option value="">Select Ticket Type</option>
<option value="1000">Player Ticket - Ksh 1000</option>
<option value="500">Spectator Ticket - Ksh 500</option>
</select>

<button type="submit" id="payBtn">Pay & Register</button>

<div class="message" id="message"></div>

</form>

</div>

<script>

const form = document.getElementById("ticketForm");
const messageDiv = document.getElementById("message");
const button = document.getElementById("payBtn");

const API_URL = "/register";

form.addEventListener("submit", async (e) => {

e.preventDefault();

button.classList.add("loading");
messageDiv.textContent="Sending STK push... Check your phone";

const formData = new FormData(form);

const data = {
fullname: formData.get("fullname"),
email: formData.get("email"),
phone: formData.get("phone"),
ticket: formData.get("ticket")
};

try{

const res = await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

const text = await res.text();

messageDiv.textContent = text;

}catch(err){

console.error(err);
messageDiv.textContent="⚠ Server connection error";

}

button.classList.remove("loading");

});

</script>

</body>
</html>
