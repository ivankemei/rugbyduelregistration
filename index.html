<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rugby Duel Event</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* ===== LANDING ===== */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.categories{
  margin:20px 0;
  width:100%;
  max-width:600px;
}

.categories div{
  margin:10px 0;
  padding:12px;
  background:rgba(255,255,255,0.1);
  border-radius:8px;
}

.btn{
  margin:10px;
  padding:14px 25px;
  border:none;
  border-radius:8px;
  background:#1a237e;
  color:white;
  cursor:pointer;
}

/* ===== FORM ===== */
.container{
  display:none;
  min-height:100vh;
  justify-content:center;
  align-items:center;
}

.form-box{
  background:white;
  color:black;
  padding:30px;
  border-radius:12px;
  width:95%;
  max-width:420px;
}

input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
}

button{
  width:100%;
  padding:13px;
  background:#1a237e;
  color:white;
  border:none;
}

.slots{font-size:14px;color:#1a237e;margin-top:5px;}
.message{margin-top:10px;font-weight:bold;}
</style>
</head>

<body>

<!-- ===== LANDING ===== -->
<div class="hero" id="landing">

<h1>🏉 Rugby Duel 2026</h1>

<p>Ultimate rugby showdown in Eldoret.</p>
<p><b>Date & Venue:</b> To be confirmed</p>

<div class="categories">
<div><b>🔥 Skill Showcase</b> - Non-contact skills</div>
<div><b>💥 Head-to-Head</b> - Full contact</div>
<div><b>🏉 Rugby 7s</b> - Limited to 8 teams</div>
<div><b>👀 Spectator</b> - Watch live</div>
</div>

<button class="btn" onclick="showTicketForm()">Register Ticket</button>
<button class="btn" onclick="showTeamForm()">Register Team</button>

</div>

<!-- ===== TICKET FORM ===== -->
<div class="container" id="ticketSection">
<div class="form-box">

<h2>Ticket Registration</h2>

<form id="ticketForm">
<input type="text" name="fullname" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="tel" name="phone" placeholder="07xxxxxxxx" required>

<select name="ticket" id="ticketSelect" required>
<option value="">Loading tickets...</option>
</select>

<p class="slots" id="slotsInfo"></p>

<button type="submit">Pay & Register</button>
<div class="message" id="ticketMsg"></div>
</form>

<button onclick="goHome()">⬅ Back</button>

</div>
</div>

<!-- ===== TEAM FORM ===== -->
<div class="container" id="teamSection">
<div class="form-box">

<h2>Team Registration (7s)</h2>

<form id="teamForm">
<input type="text" name="teamName" placeholder="Team Name" required>
<input type="text" name="captain" placeholder="Captain Name" required>
<input type="tel" name="phone" placeholder="07xxxxxxxx" required>
<input type="email" name="email" placeholder="Email" required>

<p class="slots" id="teamSlots"></p>

<button type="submit">Register Team</button>
<div class="message" id="teamMsg"></div>
</form>

<button onclick="goHome()">⬅ Back</button>

</div>
</div>

<script>
// ===== NAVIGATION =====
function showTicketForm(){
  landing.style.display="none";
  ticketSection.style.display="flex";
}
function showTeamForm(){
  landing.style.display="none";
  teamSection.style.display="flex";
}
function goHome(){
  ticketSection.style.display="none";
  teamSection.style.display="none";
  landing.style.display="flex";
}

// ===== VARIABLES =====
const ticketSelect = document.getElementById("ticketSelect");
const slotsInfo = document.getElementById("slotsInfo");
const teamSlots = document.getElementById("teamSlots");

let currentSlots = {};

// ===== LOAD TICKET SLOTS =====
async function loadSlots(){
  try{
    const res = await fetch("/slots");
    const data = await res.json();

    currentSlots = data;

    ticketSelect.innerHTML = `
      <option value="">Select Ticket</option>
      <option value="skill_showcase">${data.skill_showcase} Skill slots left</option>
      <option value="head_to_head">${data.head_to_head} Head slots left</option>
      <option value="spectator">Spectator</option>
    `;

  }catch{
    ticketSelect.innerHTML = `<option>Offline</option>`;
  }
}

// ===== LOAD TEAM SLOTS =====
async function loadTeamSlots(){
  try{
    const res = await fetch("/team_slots");
    const data = await res.json();

    teamSlots.textContent = data.remaining + " / 8 teams remaining";

  }catch{
    teamSlots.textContent = "Unable to load team slots";
  }
}

setInterval(()=>{
  loadSlots();
  loadTeamSlots();
},5000);

loadSlots();
loadTeamSlots();

// ===== TICKET SUBMIT =====
document.getElementById("ticketForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const formData = new FormData(e.target);

  await fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(Object.fromEntries(formData))
  });

  document.getElementById("ticketMsg").textContent="Check phone for payment...";
});

// ===== TEAM SUBMIT =====
document.getElementById("teamForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const formData = new FormData(e.target);

  const res = await fetch("/register_team",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(Object.fromEntries(formData))
  });

  const data = await res.json();

  document.getElementById("teamMsg").textContent = data.message;
});
</script>

</body>
</html>
