<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rugby Duel Event</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.hero, .container{
  display:flex;
}

.container{
  display:none;
  min-height:100vh;
  justify-content:center;
  align-items:center;
}

.hero{
  min-height:100vh;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.categories{
  margin:20px 0;
  width:100%;
  max-width:600px;
}

.categories div{
  margin:10px 0;
  padding:12px;
  background:rgba(255,255,255,0.1);
  border-radius:8px;
  text-align:left;
}

/* ✅ SLOT DISPLAY STYLE */
.slot-count{
  margin-top:6px;
  font-weight:bold;
  color:#ffeb3b;
}

.btn{
  margin:10px;
  padding:14px 25px;
  border:none;
  border-radius:8px;
  background:#1a237e;
  color:white;
  cursor:pointer;
}

#adminBtn{
  display:none !important;
}

.form-box{
  background:white;
  color:black;
  padding:30px;
  border-radius:12px;
  width:95%;
  max-width:420px;
  position:relative;
  z-index:1;
  overflow:visible;
}

input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
}

select{
  position:relative;
  z-index:9999;
}

button{
  width:40%;
  padding:13px;
  background:#1a237e;
  color:white;
  border:none;
  position:relative;
  z-index:1;
}

.slots{font-size:14px;color:#1a237e;margin-top:5px;}
.message{margin-top:10px;font-weight:bold;}

#paymentOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

.loader{
  border:6px solid #ccc;
  border-top:6px solid #1a237e;
  border-radius:50%;
  width:60px;
  height:60px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="hero" id="landing">

<h1>🏉 Rugby Duel 2026</h1>

<div class="categories">

<div>
<b>🔥 Skill Showcase</b><br>
Test your individual rugby skills.
<div class="slot-count" id="skillSlots">Loading...</div>
</div>

<div>
<b>💥 Head-to-Head</b><br>
1v1 rugby battles.
<div class="slot-count" id="duelSlots">Loading...</div>
</div>

<div>
<b>🏉 Rugby 7s</b><br>
Team competition.
<div class="slot-count">Unlimited</div>
</div>

<div>
<b>👀 Spectator</b><br>
Watch live.
<div class="slot-count">Unlimited</div>
</div>

</div>

<button class="btn" onclick="showTicketForm()">Register Ticket</button>
<button class="btn" onclick="showTeamForm()">Register Team</button>

<button class="btn" id="adminBtn">Admin</button>

</div>

<!-- TICKET -->
<div class="container" id="ticketSection">
<div class="form-box">
<h2>Ticket Registration</h2>

<form id="ticketForm">
<input type="text" name="fullname" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email Address" required>
<input type="tel" name="phone" placeholder="Phone Number" required>

<select name="ticket" id="ticketSelect" required>
  <option value="">Select Category</option>
  <option value="skill">Skill Showcase</option>
  <option value="duel">Head-to-Head</option>
  <option value="7s">Rugby 7s</option>
  <option value="spectator">Spectator</option>
</select>

<p class="slots" id="slotsInfo"></p>

<button type="submit" id="ticketBtn">Pay & Register</button>
<div class="message" id="ticketMsg"></div>
</form>

<button onclick="goHome()">⬅ Back</button>
</div>
</div>

<!-- TEAM -->
<div class="container" id="teamSection">
<div class="form-box">

<h2>🏉 Team Registration</h2>

<form id="teamForm">
<input name="teamName" placeholder="Team Name" required>
<input name="captainName" placeholder="Captain Name" required>
<input name="phone" placeholder="Phone Number" required>
<input name="email" placeholder="Email Address" required>

<p class="slots" id="teamSlots">8/8</p>

<button type="submit">Pay 5000</button>
<div class="message" id="teamMsg"></div>
</form>

<button onclick="goHome()">⬅ Back</button>
</div>
</div>

<script>

// NAVIGATION
function hideAll(){
  document.getElementById("landing").style.display="none";
  document.getElementById("ticketSection").style.display="none";
  document.getElementById("teamSection").style.display="none";
}

function showTicketForm(){ hideAll(); document.getElementById("ticketSection").style.display="flex"; }
function showTeamForm(){ hideAll(); document.getElementById("teamSection").style.display="flex"; }
function goHome(){ hideAll(); document.getElementById("landing").style.display="flex"; }

/* =========================
   ✅ FETCH SLOT DATA
========================= */
async function loadSlots(){
  try{
    const res = await fetch("/slots");
    const data = await res.json();

    // EXPECTED BACKEND RESPONSE:
    // { skill: 20, duel: 12 }

    document.getElementById("skillSlots").textContent =
      `${data.skill}/32 tickets left`;

    document.getElementById("duelSlots").textContent =
      `${data.duel}/32 tickets left`;

  }catch(err){
    console.log("Slot fetch failed", err);
  }
}

// RUN ON LOAD
loadSlots();

/* =========================
   (KEEP YOUR PAYMENT CODE HERE)
========================= */

</script>

</body>
</html>
