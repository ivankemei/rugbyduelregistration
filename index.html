<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rugby Duel Ticket Registration</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.container{
  background:white;
  padding:30px;
  border-radius:12px;
  width:95%;
  max-width:420px;
  text-align:center;
}

h2{margin-bottom:20px;color:#1a237e;}

input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:6px;
  background:#1a237e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:disabled{
  background:#aaa;
  cursor:not-allowed;
}

.message{
  margin-top:15px;
  font-weight:bold;
}

.slots{
  font-size:13px;
  color:#2c5364;
}
</style>

</head>

<body>

<div class="container" id="container">

<h2>🏉 Rugby Duel Ticket</h2>

<form id="ticketForm">

<input type="text" name="fullname" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email Address" required>
<input type="tel" name="phone" placeholder="07xxxxxxxx" required>

<select name="ticket" id="ticketSelect" required>
<option value="">Select Ticket Type</option>
<option value="skill_showcase">Skill Showcase</option>
<option value="head_to_head">Head to Head</option>
<option value="spectator">Spectator</option>
</select>

<p class="slots" id="slotsInfo"></p>

<button type="submit" id="payBtn">Pay & Register</button>

<div class="message" id="message"></div>

</form>

</div>

<script>
const form = document.getElementById("ticketForm");
const messageDiv = document.getElementById("message");
const button = document.getElementById("payBtn");
const ticketSelect = document.getElementById("ticketSelect");
const slotsInfo = document.getElementById("slotsInfo");

// =====================
// FETCH LIVE SLOTS
// =====================
async function loadSlots(){
  try{
    const res = await fetch("/slots");
    const data = await res.json();

    // Update dropdown labels
    ticketSelect.innerHTML = `
      <option value="">Select Ticket Type</option>
      <option value="skill_showcase" ${data.skill_showcase === 0 ? "disabled" : ""}>
        Skill Showcase (${data.skill_showcase} left)
      </option>
      <option value="head_to_head" ${data.head_to_head === 0 ? "disabled" : ""}>
        Head to Head (${data.head_to_head} left)
      </option>
      <option value="spectator">
        Spectator (Unlimited)
      </option>
    `;

  }catch(err){
    console.error(err);
  }
}

// refresh slots every 5 seconds
setInterval(loadSlots, 5000);
loadSlots();

// =====================
// SUBMIT
// =====================
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  button.disabled = true;
  form.style.display = "none";
  messageDiv.textContent = "Sending STK push...";

  const formData = new FormData(form);
  const data = {
    fullname: formData.get("fullname"),
    email: formData.get("email"),
    phone: formData.get("phone"),
    ticket: formData.get("ticket")
  };

  try {
    await fetch("/register", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });

    messageDiv.textContent = "Check your phone...";

    let attempts = 0;

    const poll = setInterval(async () => {
      attempts++;

      const res = await fetch(`/ticket_status?email=${data.email}`);
      const ticketData = await res.json();

      // ✅ SUCCESS
      if(ticketData.status === "paid"){
        clearInterval(poll);
        showTicket(ticketData.ticket);
      }

      // ❌ CANCELLED
      if(ticketData.status === "failed"){
        clearInterval(poll);
        messageDiv.textContent = "❌ Payment cancelled";
        form.style.display = "block";
        button.disabled = false;
      }

      // ⏱ TIMEOUT
      if(attempts > 20){
        clearInterval(poll);
        messageDiv.textContent = "Session expired. Try again.";
        form.style.display = "block";
        button.disabled = false;
      }

    }, 3000);

  } catch (err) {
    console.error(err);
    messageDiv.textContent = "Server error";
    form.style.display = "block";
    button.disabled = false;
  }
});

// =====================
// SHOW TICKET
// =====================
function showTicket(ticket){
  document.getElementById("container").innerHTML = `
    <h2>🎟 Ticket</h2>
    <p><b>Name:</b> ${ticket.name}</p>
    <p><b>ID:</b> ${ticket.id}</p>
    <p><b>Category:</b> ${ticket.category}</p>
    <p><b>Amount:</b> Ksh ${ticket.amount}</p>
    <a href="/download/${ticket.id}">Download Ticket</a>
  `;
}
</script>

</body>
</html>
