<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rugby Duel Event</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.categories{
  margin:20px 0;
  width:100%;
  max-width:600px;
}

.categories div{
  margin:10px 0;
  padding:12px;
  background:rgba(255,255,255,0.1);
  border-radius:8px;
  text-align:left;
}

.btn{
  margin:10px;
  padding:14px 25px;
  border:none;
  border-radius:8px;
  background:#1a237e;
  color:white;
  cursor:pointer;
}

.container{
  display:none;
  min-height:100vh;
  justify-content:center;
  align-items:center;
}

.form-box{
  background:white;
  color:black;
  padding:30px;
  border-radius:12px;
  width:95%;
  max-width:420px;
}

input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
}

button{
  width:40%;
  padding:13px;
  background:#1a237e;
  color:white;
  border:none;
}

.slots{font-size:14px;color:#1a237e;margin-top:5px;}
.message{margin-top:10px;font-weight:bold;}

.admin-flex{
  display:flex;
  flex-direction:column;
  gap:15px;
}

#reader{display:none;}

/* LOADING */
#paymentOverlay{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

.spinner{
  border:6px solid #ccc;
  border-top:6px solid #1a237e;
  border-radius:50%;
  width:60px;height:60px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div id="paymentOverlay">
  <div class="spinner"></div>
  <p id="paymentText">Processing payment...</p>
</div>

<!-- YOUR HTML REMAINS UNCHANGED -->

<!-- ================= SCRIPT ================= -->
<script>

let isAdminLoggedIn = false;
document.getElementById("adminBtn").style.display = "none";
const ADMIN_KEY = "showadmin";

if(window.location.search.includes("admin=" + ADMIN_KEY)){
  document.getElementById("adminBtn").style.display = "block";
}

// NAVIGATION (UNCHANGED)
function hideAll(){
  document.getElementById("landing").style.display="none";
  document.getElementById("ticketSection").style.display="none";
  document.getElementById("teamSection").style.display="none";
  document.getElementById("adminLogin").style.display="none";
  document.getElementById("adminDash").style.display="none";
}

function showTicketForm(){
  hideAll();
  document.getElementById("ticketSection").style.display="flex";
  loadSlots(); // 🔥 LIVE REFRESH WHEN OPENING
}

function showTeamForm(){
  hideAll();
  document.getElementById("teamSection").style.display="flex";
  loadTeamSlots(); // 🔥 LIVE REFRESH
}

function showAdminLogin(){ hideAll(); document.getElementById("adminLogin").style.display="flex"; }

function goHome(){ hideAll(); document.getElementById("landing").style.display="flex"; }

// ================= PAYMENT UI =================
function showPayment(text){
  document.getElementById("paymentOverlay").style.display="flex";
  document.getElementById("paymentText").textContent = text || "Processing payment...";
}

function hidePayment(){
  document.getElementById("paymentOverlay").style.display="none";
}

// ================= TICKET =================
document.getElementById("ticketForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const msg = document.getElementById("ticketMsg");
  const btn = document.getElementById("ticketBtn");

  btn.disabled = true;
  showPayment("Processing payment...");

  const data = Object.fromEntries(new FormData(e.target));

  try{
    const res = await fetch("/register",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });

    const result = await res.json();

    if(result.orderId){
      pollPayment(result.orderId, msg, btn, true);
    }else{
      hidePayment();
      msg.textContent = result.message;
      btn.disabled = false;
    }

  }catch{
    hidePayment();
    msg.textContent = "❌ Error";
    btn.disabled = false;
  }
});

// ================= TEAM =================
document.getElementById("teamForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const msg = document.getElementById("teamMsg");
  const btn = document.getElementById("teamBtn");

  btn.disabled = true;
  showPayment("Processing team payment...");

  const data = Object.fromEntries(new FormData(e.target));

  try{
    const res = await fetch("/register-team",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });

    const result = await res.json();

    if(result.orderId){
      pollPayment(result.orderId, msg, btn, false);
    }else{
      hidePayment();
      msg.textContent = result.message;
      btn.disabled = false;
    }

  }catch{
    hidePayment();
    msg.textContent = "❌ Error";
    btn.disabled = false;
  }
});

// ================= PAYMENT POLLING =================
function pollPayment(orderId, msg, btn, isTicket){

  let tries = 0;

  const interval = setInterval(async ()=>{

    tries++;

    try{
      const res = await fetch(`/payment-status?orderId=${orderId}`);
      const data = await res.json();

      if(data.status === "success"){
        clearInterval(interval);

        document.getElementById("paymentText").textContent = "Payment successful!";

        setTimeout(()=>{
          hidePayment();
          msg.textContent = "✅ Payment successful!";
          btn.disabled = false;
        },1000);
      }

      if(data.status === "cancelled"){
        clearInterval(interval);

        document.getElementById("paymentText").textContent = "Payment cancelled";

        setTimeout(()=>{
          hidePayment();
          msg.textContent = "❌ Payment cancelled";

          if(isTicket){
            document.getElementById("ticketForm").reset();
          }else{
            document.getElementById("teamForm").reset();
          }

          btn.disabled = false;
        },1000);
      }

    }catch{}

    if(tries > 20){
      clearInterval(interval);
      hidePayment();
      msg.textContent = "⏳ Timeout";
      btn.disabled = false;
    }

  },3000);
}

</script>

</body>
</html>
