<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rugby Duel Event</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* ===== LANDING ===== */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.hero h1{font-size:32px;margin-bottom:10px;}
.hero p{max-width:500px;margin-bottom:20px;}

.categories div{
  margin:10px 0;
  padding:10px;
  background:rgba(255,255,255,0.1);
  border-radius:6px;
}

.start-btn{
  padding:14px 25px;
  border:none;
  border-radius:8px;
  background:#1a237e;
  color:white;
  cursor:pointer;
}

/* ===== FORM ===== */
.container{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.form-box{
  background:white;
  color:black;
  padding:30px;
  border-radius:12px;
  width:95%;
  max-width:420px;
  text-align:center;
}

input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
}

button{
  width:100%;
  padding:13px;
  background:#1a237e;
  color:white;
  border:none;
}

button:disabled{background:#aaa;}

.message{margin-top:15px;font-weight:bold;}
.slots{font-size:14px;color:#1a237e;margin-top:5px;}
</style>
</head>

<body>

<!-- LANDING -->
<div class="hero" id="landing">
<h1>🏉 Rugby Duel 2026</h1>
<p>Ultimate 1v1 rugby showdown. Limited slots. Only the best compete.</p>

<div class="categories">
  <div><b>Skill Showcase</b> - Non-contact skills</div>
  <div><b>Head-to-Head</b> - Full contact</div>
  <div><b>Spectator</b> - Watch live</div>
</div>

<button class="start-btn" onclick="startRegistration()">Register Now</button>
</div>

<!-- FORM -->
<div class="container" id="formSection">
<div class="form-box" id="container">

<h2>Register</h2>

<form id="ticketForm">
<input type="text" name="fullname" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="tel" name="phone" placeholder="07xxxxxxxx" required>

<select name="ticket" id="ticketSelect" required>
<option value="">Loading...</option>
</select>

<p class="slots" id="slotsInfo"></p>

<button type="submit" id="payBtn">Pay & Register</button>
<div class="message" id="message"></div>
</form>

</div>
</div>

<script>
function startRegistration(){
  document.getElementById("landing").style.display="none";
  document.getElementById("formSection").style.display="flex";
}

const form = document.getElementById("ticketForm");
const messageDiv = document.getElementById("message");
const button = document.getElementById("payBtn");
const ticketSelect = document.getElementById("ticketSelect");
const slotsInfo = document.getElementById("slotsInfo");

let currentSlots = {};

// ================= LOAD SLOTS =================
async function loadSlots(){
  try{
    const res = await fetch("/slots");
    const data = await res.json();

    currentSlots = data;

    ticketSelect.innerHTML = `
      <option value="">Select Ticket Type</option>
      <option value="skill_showcase" ${data.skill_showcase===0?"disabled":""}>
        Skill Showcase (${data.skill_showcase} left)
      </option>
      <option value="head_to_head" ${data.head_to_head===0?"disabled":""}>
        Head to Head (${data.head_to_head} left)
      </option>
      <option value="spectator">
        Spectator (Unlimited)
      </option>
    `;

  }catch(err){
    console.error(err);
  }
}

// SHOW SLOT INFO WHEN SELECTED
ticketSelect.addEventListener("change", ()=>{
  const val = ticketSelect.value;

  if(val === "spectator"){
    slotsInfo.textContent = "Unlimited spectators allowed";
  } 
  else if(currentSlots[val] !== undefined){
    slotsInfo.textContent = currentSlots[val] + " slots remaining";
  } else {
    slotsInfo.textContent = "";
  }
});

// refresh every 5s
setInterval(loadSlots, 5000);
loadSlots(); // IMPORTANT (you missed this)

// ================= SUBMIT =================
form.addEventListener("submit", async (e)=>{
  e.preventDefault();

  button.disabled = true;
  form.style.display = "none";
  messageDiv.textContent = "Sending STK push...";

  const formData = new FormData(form);
  const data = {
    fullname: formData.get("fullname"),
    email: formData.get("email"),
    phone: formData.get("phone"),
    ticket: formData.get("ticket")
  };

  try{
    await fetch("/register",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });

    messageDiv.textContent = "Check your phone...";

    let attempts = 0;

    const poll = setInterval(async ()=>{
      attempts++;

      const res = await fetch(`/ticket_status?email=${data.email}`);
      const ticketData = await res.json();

      if(ticketData.status==="paid"){
        clearInterval(poll);
        showTicket(ticketData.ticket);
      }

      if(ticketData.status==="failed"){
        clearInterval(poll);
        messageDiv.textContent="❌ Payment cancelled";
        form.style.display="block";
        button.disabled=false;
      }

      if(attempts>20){
        clearInterval(poll);
        messageDiv.textContent="Session expired. Try again.";
        form.style.display="block";
        button.disabled=false;
      }

    },3000);

  }catch(err){
    console.error(err);
    messageDiv.textContent="Server error";
    form.style.display="block";
    button.disabled=false;
  }
});

// ================= SHOW TICKET =================
function showTicket(ticket){
  document.getElementById("container").innerHTML=`
    <h2>🎟 Ticket</h2>
    <p><b>Name:</b> ${ticket.name}</p>
    <p><b>ID:</b> ${ticket.id}</p>
    <p><b>Category:</b> ${ticket.category}</p>
    <p><b>Amount:</b> Ksh ${ticket.amount}</p>
    <a href="/download/${ticket.id}">Download Ticket</a>
  `;
}
</script>

</body>
</html>
