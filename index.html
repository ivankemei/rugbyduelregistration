<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rugby Duel Event</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.categories{
  margin:20px 0;
  width:100%;
  max-width:600px;
}

.categories div{
  margin:10px 0;
  padding:12px;
  background:rgba(255,255,255,0.1);
  border-radius:8px;
}

.btn{
  margin:10px;
  padding:14px 25px;
  border:none;
  border-radius:8px;
  background:#1a237e;
  color:white;
  cursor:pointer;
}

.container{
  display:none;
  min-height:100vh;
  justify-content:center;
  align-items:center;
}

.form-box{
  background:white;
  color:black;
  padding:30px;
  border-radius:12px;
  width:95%;
  max-width:420px;
}

input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
}

button{
  width:40%;
  padding:13px;
  background:#1a237e;
  color:white;
  border:none;
}

.slots{font-size:14px;color:#1a237e;margin-top:5px;}
.message{margin-top:10px;font-weight:bold;}

.admin-flex{
  display:flex;
  flex-direction:column;
  gap:15px;
}

#reader{
  display:none;
}
</style>
</head>

<body>

<!-- LANDING -->
<div class="hero" id="landing">
<h1>🏉 Rugby Duel 2026</h1>
<p>Ultimate rugby showdown in Eldoret.</p>
<p><b>Date & Venue:</b> To be confirmed</p>

<div class="categories">
<div><b>🔥 Skill Showcase</b></div>
<div><b>💥 Head-to-Head</b></div>
<div><b>🏉 Rugby 7s</b></div>
<div><b>👀 Spectator</b></div>
</div>

<button class="btn" onclick="showTicketForm()">Register Ticket</button>
<button class="btn" onclick="showTeamForm()">Register Team</button>
<button class="btn" onclick="showAdminLogin()">Admin</button>
</div>

<!-- TICKET -->
<div class="container" id="ticketSection">
<div class="form-box">
<h2>Ticket Registration</h2>

<form id="ticketForm">
<input type="text" name="fullname" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email Address" required>
<input type="tel" name="phone" placeholder="Phone Number" required>

<select name="ticket" id="ticketSelect" required></select>

<p class="slots" id="slotsInfo"></p>

<button type="submit" id="ticketBtn">Pay & Register</button>
<div class="message" id="ticketMsg"></div>
</form>

<button onclick="goHome()">⬅ Back</button>
</div>
</div>

<!-- TEAM -->
<div class="container" id="teamSection">
<div class="form-box">

<h2>🏉 Team Registration</h2>

<form id="teamForm">
<input name="teamName" placeholder="Team Name" required>
<input name="captainName" placeholder="Captain Name" required>
<input name="phone" placeholder="Phone Number" required>
<input name="email" placeholder="Email Address" required>

<p class="slots">⚡ Limited to 8 teams only</p>

<button type="submit" id="teamBtn">Pay 5000</button>
<div class="message" id="teamMsg"></div>
</form>

<button onclick="goHome()">⬅ Back</button>
</div>
</div>

<!-- ADMIN LOGIN -->
<div class="container" id="adminLogin">
<div class="form-box">
<h2>Admin Login</h2>
<input id="adminPass" type="password" placeholder="Password">
<button onclick="loginAdmin()">Login</button>
</div>
</div>

<!-- ADMIN DASHBOARD -->
<div class="container" id="adminDash">
<div class="form-box admin-flex">
<h2>Dashboard</h2>
<p id="adminData"></p>

<button onclick="toggleScanner()">📷 Scan Ticket</button>
<div id="reader"></div>
<p id="scanResult"></p>

<button onclick="goHome()">Logout</button>
</div>
</div>

<script>

// NAVIGATION
function hideAll(){
  document.getElementById("landing").style.display="none";
  document.getElementById("ticketSection").style.display="none";
  document.getElementById("teamSection").style.display="none";
  document.getElementById("adminLogin").style.display="none";
  document.getElementById("adminDash").style.display="none";
}

function showTicketForm(){ hideAll(); document.getElementById("ticketSection").style.display="flex"; }
function showTeamForm(){ hideAll(); document.getElementById("teamSection").style.display="flex"; }
function showAdminLogin(){ hideAll(); document.getElementById("adminLogin").style.display="flex"; }

function goHome(){
  hideAll();
  document.getElementById("landing").style.display="flex";
}

// ADMIN LOGIN
function loginAdmin(){
  const pass = document.getElementById("adminPass").value;

  if(pass === "admin123"){
    hideAll();
    document.getElementById("adminDash").style.display="flex";
  } else {
    alert("Wrong password");
  }
}

// QR
let scanner;
function toggleScanner(){
  const reader = document.getElementById("reader");

  if(reader.style.display === "none"){
    reader.style.display = "block";

    scanner = new Html5Qrcode("reader");
    scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      (decodedText) => {
        document.getElementById("scanResult").textContent = decodedText;
      }
    );
  } else {
    reader.style.display = "none";
    if(scanner) scanner.stop();
  }
}

// TICKET LOGIC (unchanged)
const form = document.getElementById("ticketForm");
const messageDiv = document.getElementById("ticketMsg");
const button = document.getElementById("ticketBtn");
const ticketSelect = document.getElementById("ticketSelect");
const slotsInfo = document.getElementById("slotsInfo");

let currentSlots = {};

async function loadSlots(){
  try{
    const res = await fetch("/slots");
    const data = await res.json();
    currentSlots = data;

    ticketSelect.innerHTML = `
      <option value="">Select Ticket</option>
      <option value="skill_showcase">Skill (${data.skill_showcase})</option>
      <option value="head_to_head">Head (${data.head_to_head})</option>
      <option value="spectator">Spectator</option>
    `;
  }catch{
    slotsInfo.textContent="⚠ Error loading slots";
  }
}

loadSlots();

// TICKET SUBMIT
form.addEventListener("submit", async (e)=>{
  e.preventDefault();

  button.disabled=true;
  messageDiv.textContent="Processing...";

  const data = Object.fromEntries(new FormData(form));

  const res = await fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  const result = await res.json();
  messageDiv.textContent = result.message || "Check phone";
});

// TEAM SUBMIT
document.getElementById("teamForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const msg = document.getElementById("teamMsg");
  const btn = document.getElementById("teamBtn");

  btn.disabled = true;
  msg.textContent = "Processing...";

  const data = Object.fromEntries(new FormData(e.target));

  const res = await fetch("/register-team",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  const result = await res.json();
  msg.textContent = result.message || "Check phone";
});

</script>

</body>
</html>
