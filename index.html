<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rugby Duel Event</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.categories{
  margin:20px 0;
  width:100%;
  max-width:600px;
}

.categories div{
  margin:10px 0;
  padding:12px;
  background:rgba(255,255,255,0.1);
  border-radius:8px;
  text-align:left;
}

.btn{
  margin:10px;
  padding:14px 25px;
  border:none;
  border-radius:8px;
  background:#1a237e;
  color:white;
  cursor:pointer;
}

.container{
  display:none;
  min-height:100vh;
  justify-content:center;
  align-items:center;
}

.form-box{
  background:white;
  color:black;
  padding:30px;
  border-radius:12px;
  width:95%;
  max-width:420px;
}

input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
}

button{
  width:40%;
  padding:13px;
  background:#1a237e;
  color:white;
  border:none;
}

.slots{font-size:14px;color:#1a237e;margin-top:5px;}
.message{margin-top:10px;font-weight:bold;}

.admin-flex{
  display:flex;
  flex-direction:column;
  gap:15px;
}

#reader{display:none;}

/* 🔥 LOADER */
.loader{
  border:4px solid #f3f3f3;
  border-top:4px solid #1a237e;
  border-radius:50%;
  width:25px;
  height:25px;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<!-- LANDING -->
<div class="hero" id="landing">
<h1>🏉 Rugby Duel 2026</h1>
<p>Ultimate rugby showdown in Eldoret.</p>
<p><b>Date & Venue:</b> To be confirmed</p>

<div class="categories">
<div><b>🔥 Skill Showcase</b><br>Test your individual rugby skills.</div>
<div><b>💥 Head-to-Head</b><br>1v1 rugby battles.</div>
<div><b>🏉 Rugby 7s</b><br>Team-based competition.</div>
<div><b>👀 Spectator</b><br>Watch live.</div>
</div>

<button class="btn" onclick="showTicketForm()">Register Ticket</button>
<button class="btn" onclick="showTeamForm()">Register Team</button>
<button class="btn" id="adminBtn" onclick="showAdminLogin()">Admin</button>
</div>

<!-- TICKET -->
<div class="container" id="ticketSection">
<div class="form-box">
<h2>Ticket Registration</h2>

<form id="ticketForm">
<input type="text" name="fullname" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email Address" required>
<input type="tel" name="phone" placeholder="Phone Number" required>

<select name="ticket" id="ticketSelect" required></select>
<p class="slots" id="slotsInfo"></p>

<button type="submit" id="ticketBtn">Pay & Register</button>
<div class="message" id="ticketMsg"></div>
</form>

<button onclick="goHome()">⬅ Back</button>
</div>
</div>

<script>
// ================= PAYMENT CHECKER =================
async function checkPaymentStatus(email, msg, btn, form){
  let attempts = 0;

  const interval = setInterval(async ()=>{
    attempts++;

    try{
      const res = await fetch(`/payment-status?email=${email}`);
      const data = await res.json();

      if(data.status === "success"){
        msg.innerHTML = "✅ Payment Successful!";
        clearInterval(interval);
        btn.disabled = false;
        form.reset();
      }

      if(data.status === "failed"){
        msg.innerHTML = "❌ Payment Cancelled";
        clearInterval(interval);
        btn.disabled = false;
      }

    }catch{}

    if(attempts > 20){
      msg.innerHTML = "⚠ Timeout. Try again.";
      clearInterval(interval);
      btn.disabled = false;
    }

  },3000);
}

// ================= TICKET SUBMIT =================
document.getElementById("ticketForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const msg = document.getElementById("ticketMsg");
  const btn = document.getElementById("ticketBtn");

  btn.disabled=true;
  msg.innerHTML = `<div class="loader"></div><p>Waiting for payment...</p>`;

  const data = Object.fromEntries(new FormData(e.target));

  const res = await fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  const result = await res.json();

  // 🔥 START CHECKING PAYMENT
  checkPaymentStatus(data.email, msg, btn, e.target);
});
</script>

</body>
</html>
