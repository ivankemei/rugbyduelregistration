<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rugby Duel Event</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.categories{
  margin:20px 0;
  width:100%;
  max-width:600px;
}

.categories div{
  margin:10px 0;
  padding:12px;
  background:rgba(255,255,255,0.1);
  border-radius:8px;
  text-align:left;
}

.btn{
  margin:10px;
  padding:14px 25px;
  border:none;
  border-radius:8px;
  background:#1a237e;
  color:white;
  cursor:pointer;
}

.container{
  display:none;
  min-height:100vh;
  justify-content:center;
  align-items:center;
}

.form-box{
  background:white;
  color:black;
  padding:30px;
  border-radius:12px;
  width:95%;
  max-width:420px;
}

input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
}

button{
  width:40%;
  padding:13px;
  background:#1a237e;
  color:white;
  border:none;
}

.slots{font-size:14px;color:#1a237e;margin-top:5px;}
.message{margin-top:10px;font-weight:bold;}

.admin-flex{
  display:flex;
  flex-direction:column;
  gap:15px;
}

#reader{
  display:none;
}

/* ✅ LOADER */
.loader{
  border:5px solid #f3f3f3;
  border-top:5px solid #1a237e;
  border-radius:50%;
  width:30px;
  height:30px;
  animation:spin 1s linear infinite;
  margin:10px auto;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<!-- (UNCHANGED HTML ABOVE) -->

<script>

// ================= PAYMENT STATUS CHECK =================

// 🔁 TICKET STATUS POLLING
async function checkTicketStatus(email, msg, btn){

  const interval = setInterval(async ()=>{

    try{
      const res = await fetch(`/status?email=${email}`);
      const data = await res.json();

      if(data.status === "paid"){
        msg.innerHTML = "✅ Payment successful. Ticket confirmed.";
        btn.disabled = false;
        clearInterval(interval);
      }

      if(data.status === "failed"){
        msg.innerHTML = "❌ Payment cancelled or failed.";
        btn.disabled = false;
        clearInterval(interval);
      }

    }catch{}
  },3000);
}

// 🔁 TEAM STATUS POLLING
async function checkTeamStatus(email, msg, btn){

  const interval = setInterval(async ()=>{

    try{
      const res = await fetch(`/team_status?email=${email}`);
      const data = await res.json();

      if(data.status === "paid"){
        msg.innerHTML = "✅ Team registered successfully!";
        btn.disabled = false;
        clearInterval(interval);
      }

      if(data.status === "failed"){
        msg.innerHTML = "❌ Payment cancelled.";
        btn.disabled = false;
        clearInterval(interval);
      }

    }catch{}
  },3000);
}

// ================= TICKET SUBMIT =================
document.getElementById("ticketForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const msg = document.getElementById("ticketMsg");
  const btn = document.getElementById("ticketBtn");

  btn.disabled=true;

  msg.innerHTML = `
    ⏳ Waiting for payment confirmation...
    <div class="loader"></div>
  `;

  const data = Object.fromEntries(new FormData(e.target));

  const res = await fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  await res.json();

  // 🔥 START POLLING
  checkTicketStatus(data.email, msg, btn);
});

// ================= TEAM SUBMIT =================
document.getElementById("teamForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const msg = document.getElementById("teamMsg");
  const btn = document.getElementById("teamBtn");

  btn.disabled = true;

  msg.innerHTML = `
    ⏳ Waiting for payment confirmation...
    <div class="loader"></div>
  `;

  const data = Object.fromEntries(new FormData(e.target));

  const res = await fetch("/register-team",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  await res.json();

  // 🔥 START POLLING
  checkTeamStatus(data.email, msg, btn);
});

</script>

</body>
</html>
